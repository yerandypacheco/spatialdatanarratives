<body>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --paper:#F6F6F6;--yellow:#FBDE7B;--blush:#EBC9CA;
  --mauve:#775A5B;--sage:#ABB79F;--slate:#718FAB;--red:#AA2111;
  --ink:#2A1F1F;--ink2:#4A3535;--ink3:#775A5B;--ink4:#A89090;
}
html,body{width:100%;height:100%;background:#0a0a0a;overflow:hidden;font-family:'IBM Plex Mono',monospace;color:var(--ink);}

#three-canvas{position:fixed;inset:0;z-index:1;cursor:grab;}
#three-canvas.grabbing{cursor:grabbing;}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:50;padding:12px 22px;display:flex;justify-content:space-between;align-items:flex-start;background:rgba(246,246,246,0.9);backdrop-filter:blur(8px);border-bottom:1px solid rgba(119,90,91,0.15);pointer-events:none;}
.tb-t{font-family:'IBM Plex Sans Condensed',sans-serif;font-size:clamp(.9rem,1.8vw,1.45rem);font-weight:800;letter-spacing:-0.02em;line-height:1;}
.tb-t em{color:var(--red);font-style:normal;}
.tb-m{font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink4);line-height:2.1;text-align:right;}

/* PANEL */
#panel{position:fixed;top:56px;left:14px;width:292px;z-index:50;background:rgba(246,246,246,0.97);border:1px solid rgba(119,90,91,0.2);overflow:hidden;box-shadow:4px 6px 24px rgba(42,31,31,0.14);transform:translateX(-316px);transition:transform .35s cubic-bezier(0.22,1,0.36,1);max-height:calc(100vh - 180px);}
#panel.open{transform:translateX(0);}
#ps{overflow-y:auto;max-height:calc(100vh - 180px);scrollbar-width:thin;scrollbar-color:var(--blush) transparent;}
.p-iw{position:relative;width:100%;height:115px;overflow:hidden;background:var(--mauve);}
.p-iw img{width:100%;height:100%;object-fit:cover;display:block;}
.p-ic{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(42,31,31,0.75));padding:16px 9px 5px;font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;color:#f6f6f6;}
.p-b{padding:11px 13px;}
.p-fl{display:inline-block;font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;border:1px solid currentColor;padding:2px 5px;margin-bottom:7px;}
.p-fl.forced{color:var(--red)}.p-fl.colonial{color:var(--slate)}.p-fl.voluntary{color:var(--sage)}.p-fl.diaspora{color:var(--mauve)}
.p-nm{font-family:'IBM Plex Sans Condensed',sans-serif;font-size:1.1rem;font-weight:700;line-height:1.1;margin-bottom:2px;}
.p-pt{font-family:'IBM Plex Sans Condensed',sans-serif;font-size:1.85rem;font-weight:700;color:var(--red);line-height:1;display:block;margin-bottom:9px;}
.p-hr{height:1px;background:rgba(119,90,91,0.14);margin:6px 0;}
.p-sh{font-size:6.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--ink3);margin-bottom:2px;font-weight:500;}
.p-tx{font-size:8px;line-height:1.72;color:var(--ink2);margin-bottom:4px;}
.p-sr{display:flex;gap:7px;margin:7px 0;flex-wrap:wrap;}
.p-st{background:var(--blush);padding:4px 7px;flex:1;min-width:65px;}
.p-sn{font-family:'IBM Plex Sans Condensed',sans-serif;font-size:1.2rem;font-weight:700;color:var(--red);line-height:1;}
.p-sl{font-size:6.5px;color:var(--ink3);letter-spacing:.04em;line-height:1.3;margin-top:1px;}
.p-td{margin-top:9px;padding:7px 9px;background:rgba(171,183,159,0.18);border-left:2px solid var(--sage);}
.p-tdh{font-size:6.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--sage);margin-bottom:2px;font-weight:500;}
.p-tdt{font-size:8px;line-height:1.65;color:var(--ink2);}
.p-cl{position:absolute;top:7px;right:9px;font-size:13px;cursor:pointer;color:var(--ink4);background:none;border:none;z-index:2;pointer-events:all;}

/* SATELLITE BADGE */
#sat-badge{display:none;}
#zoom-btns{position:fixed;bottom:110px;right:14px;z-index:50;display:flex;flex-direction:column;gap:4px;}
.zb{width:28px;height:28px;background:rgba(246,246,246,0.92);border:1px solid rgba(119,90,91,0.2);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--ink2);line-height:1;font-family:'IBM Plex Mono',monospace;}
.zb:hover{background:rgba(246,246,246,1);}

/* TIMELINE */
#timeline{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(246,246,246,0.93);backdrop-filter:blur(8px);border-top:1px solid rgba(119,90,91,0.15);}
#yr-row{padding:8px 22px 2px;display:flex;align-items:baseline;gap:11px;}
.yr-n{font-family:'IBM Plex Sans Condensed',sans-serif;font-size:1.9rem;font-weight:800;letter-spacing:-.03em;color:var(--red);line-height:1;min-width:76px;}
.yr-e{font-size:7.5px;letter-spacing:.06em;color:var(--ink3);line-height:1.5;flex:1;max-width:560px;}
.yr-h{margin-left:auto;font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink4);}
#dw{position:relative;height:56px;overflow:hidden;cursor:ew-resize;}
#dn{position:absolute;left:50%;top:4px;bottom:2px;width:1.5px;background:var(--red);transform:translateX(-50%);pointer-events:none;z-index:2;}
#dn::before{content:'';position:absolute;top:-4px;left:50%;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--red);}
#dt{display:flex;align-items:flex-end;height:100%;padding-bottom:8px;will-change:transform;}
.tk{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:opacity .2s;}
.tkm{background:var(--ink4);border-radius:1px;transition:background .2s;}
.tkl{font-size:6.5px;letter-spacing:.07em;color:var(--ink4);white-space:nowrap;transition:color .2s;}
.tk.active .tkm{background:var(--red);}.tk.active .tkl{color:var(--red);font-weight:500;}
.tk.near .tkl{color:var(--ink3);}

/* LOADING */
#loading{position:fixed;inset:0;z-index:999;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.lh{font-family:'IBM Plex Sans Condensed',sans-serif;font-size:clamp(2rem,6vw,5rem);font-weight:800;letter-spacing:-.03em;}
.lh em{color:var(--red);font-style:normal;}
.lb-bg{width:180px;height:2px;background:rgba(119,90,91,0.15);}
.lb-fill{height:100%;background:var(--red);width:0;transition:width .3s;}
.ll{font-size:7px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink4);}
</style>

<canvas id="three-canvas"></canvas>

<div id="topbar">
  <div>
    <div class="tb-t">HOW I GOT <em>HERE</em></div>
    <div style="font-size:6.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink4);margin-top:3px">AncestryDNA · Yerandy Pacheco · Columbia GSAPP 2025</div>
  </div>
  <div class="tb-m">Dominican Republic → Brooklyn NY<br>23 Regions · 5 Continents · 10,000+ Years</div>
</div>

<div id="zoom-btns">
  <button class="zb" id="zin" title="Zoom in">+</button>
  <button class="zb" id="zout" title="Zoom out">−</button>
</div>

<div id="panel">
  <button class="p-cl" id="pcl">✕</button>
  <div id="ps"><div id="pc"></div></div>
</div>

<div id="timeline">
  <div id="yr-row">
    <div class="yr-n" id="yn">—</div>
    <div class="yr-e" id="ye"></div>
    <div class="yr-h">drag · scroll · arrows</div>
  </div>
  <div id="dw"><div id="dn"></div><div id="dt"></div></div>
</div>

<div id="loading">
  <div class="lh">HOW I GOT <em>HERE</em></div>
  <div class="lb-bg"><div class="lb-fill" id="lbf"></div></div>
  <div class="ll" id="lbl">Loading geography...</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

<script>

const P={
  red:[0.667,0.129,0.067],yellow:[0.984,0.871,0.482],
  blush:[0.922,0.788,0.792],mauve:[0.467,0.353,0.357],

// SATELLITE GLOBE TEXTURE
// Stitches ArcGIS zoom-2 tiles (4x4 grid) onto a canvas → CanvasTexture
// Avoids WebGL CORS by using 2D canvas drawImage (no getImageData needed)
// ═══════════════════════════════════════════

function buildSatelliteTexture(onDone){
  // Use NASA GIBS BlueMarble_ShadedRelief_Bathymetry tiles — no CORS, real satellite/topo imagery
  // Zoom 2 = 4 cols x 2 rows in TMS (but we build a 4x4 canvas; bottom 2 rows repeat for south pole area)
  const TILE_W=256, TILE_H=256;
  const COLS=4, ROWS=4;
  const cw=COLS*TILE_W, ch=ROWS*TILE_H;
  const offscreen=document.createElement('canvas');
  offscreen.width=cw; offscreen.height=ch;
  const ctx=offscreen.getContext('2d');
  ctx.fillStyle='#0d1b2a'; ctx.fillRect(0,0,cw,ch);

  // NASA GIBS WMTS: BlueMarble_NextGeneration at zoom 2 is 4x2 tiles (cols 0-3, rows 0-1)
  // We stretch it to our 4x4 canvas by doubling row height for a nicer equirectangular fit
  let loaded=0;
  const TILE_ROWS=2, TILE_COLS=4;
  const total=TILE_ROWS*TILE_COLS;

  function tryDone(){ loaded++; if(loaded===total) onDone(offscreen); }

  for(let ty=0;ty<TILE_ROWS;ty++){
    for(let tx=0;tx<TILE_COLS;tx++){
      (function(row,col){
        // NASA GIBS Blue Marble + topo shading — no auth, no CORS
        const url=`https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/BlueMarble_NextGeneration/default/2004-08-01/GoogleMapsCompatible_Level8/${2}/${row}/${col}.jpg`;
        const img=new Image();
        img.crossOrigin='anonymous';
        img.onload=function(){
          // Each row spans half the canvas height (2 tile rows → full sphere)
          ctx.drawImage(img, col*TILE_W, row*(ch/TILE_ROWS), TILE_W, ch/TILE_ROWS);
          tryDone();
        };
        img.onerror=function(){
          // Fallback: try Stamen terrain tiles via a different path
          const fb=new Image();
          fb.crossOrigin='anonymous';
          fb.onload=function(){ ctx.drawImage(fb, col*TILE_W, row*(ch/TILE_ROWS), TILE_W, ch/TILE_ROWS); tryDone(); };
          fb.onerror=function(){ tryDone(); };
          fb.src=`https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/MODIS_Terra_CorrectedReflectance_TrueColor/default/2023-01-01/250m/${2}/${row}/${col}.jpg`;
        };
        img.src=url;
      })(ty,tx);
    }
  }
}

// Called after globe is created — applies satellite texture to base sphere
function applySatelliteTexture(){
  buildSatelliteTexture(canvas2d=>{
    const tex=new THREE.CanvasTexture(canvas2d);
    tex.needsUpdate=true;
    // Equirectangular wrapping for proper globe mapping
    tex.wrapS=THREE.RepeatWrapping;
    tex.wrapT=THREE.RepeatWrapping;
    const baseSphere=globe.children[0];
    baseSphere.material.map=tex;
    baseSphere.material.color.set(0xffffff);
    baseSphere.material.needsUpdate=true;
    // Keep refreshing for a few seconds as tiles paint in
    let refreshCount=0;
    const interval=setInterval(()=>{
      tex.needsUpdate=true;
      refreshCount++;
      if(refreshCount>30)clearInterval(interval);
    },200);
  });
}

const R=1.0;
function ll2v(lat,lon,r){
  const phi=(90-lat)*Math.PI/180,th=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(phi)*Math.cos(th),r*Math.cos(phi),r*Math.sin(phi)*Math.sin(th));
}

// Country tessellation
// earcut in lon/lat, then subdivide each triangle edge to follow sphere curvature.
// This eliminates the "holes at boundaries" caused by flat triangles bowing inward on the sphere.
function featureToMesh(feat,col,op){
  const polys=feat.geometry.type==='Polygon'?[feat.geometry.coordinates]:feat.geometry.coordinates;
  const av=[];

  // Subdivide a great-circle edge into N segments so it hugs the sphere
  function subdividePts(lo0,la0,lo1,la1,steps){
    const pts=[];
    for(let s=0;s<=steps;s++){
      const t=s/steps;
      // Spherical lerp (slerp) between the two points
      const v0=ll2v(la0,lo0,R+0.003);
      const v1=ll2v(la1,lo1,R+0.003);
      const dot=Math.max(-1,Math.min(1,v0.clone().normalize().dot(v1.clone().normalize())));
      const omega=Math.acos(dot);
      let v;
      if(omega<0.0001){ v=v0.clone().lerp(v1,t); }
      else { v=v0.clone().multiplyScalar(Math.sin((1-t)*omega)/Math.sin(omega)).add(v1.clone().multiplyScalar(Math.sin(t*omega)/Math.sin(omega))); }
      v.normalize().multiplyScalar(R+0.003);
      pts.push(v);
    }
    return pts;
  }

  polys.forEach(poly=>{
    const outer=poly[0];if(!outer||outer.length<3)return;
    const holeRings=poly.slice(1);
    const allRings=[outer,...holeRings];

    // Check for antimeridian crossing — if any ring spans > 180° in longitude, skip it
    // (these cause giant wrap-around triangles; world-atlas-110m rarely has them at this scale)
    let skip=false;
    for(const ring of allRings){
      let minLo=Infinity,maxLo=-Infinity;
      ring.forEach(([lo])=>{if(lo<minLo)minLo=lo;if(lo>maxLo)maxLo=lo;});
      if(maxLo-minLo>350){skip=true;break;}
    }
    if(skip)return;

    const cf=[];
    const fv=[];
    const hi=[];
    allRings.forEach((ring,ri)=>{
      if(ri>0) hi.push(cf.length);
      ring.forEach(([lo,la])=>{ cf.push([lo,la]); fv.push(lo,la); });
    });

    let idx;
    try{ idx=earcut(fv,hi.length?hi:null,2); }catch(e){ return; }
    if(!idx||!idx.length)return;

    // Recursively subdivide each triangle so faces hug the sphere — 2 levels = 16 sub-triangles each
    function smid(a,b){return a.clone().add(b).normalize().multiplyScalar(R+0.003);}
    function subdiv(p0,p1,p2,depth){
      if(depth===0){av.push(p0.x,p0.y,p0.z,p1.x,p1.y,p1.z,p2.x,p2.y,p2.z);return;}
      const m01=smid(p0,p1),m12=smid(p1,p2),m20=smid(p2,p0);
      subdiv(p0,m01,m20,depth-1);subdiv(m01,p1,m12,depth-1);
      subdiv(m20,m12,p2,depth-1);subdiv(m01,m12,m20,depth-1);
    }
    for(let t=0;t<idx.length;t+=3){
      const i0=idx[t],i1=idx[t+1],i2=idx[t+2];
      if(!cf[i0]||!cf[i1]||!cf[i2])continue;
      const[lo0,la0]=cf[i0],[lo1,la1]=cf[i1],[lo2,la2]=cf[i2];
      const p0=ll2v(la0,lo0,R+0.003);
      const p1=ll2v(la1,lo1,R+0.003);
      const p2=ll2v(la2,lo2,R+0.003);
      subdiv(p0,p1,p2,2);
    }
  });

  if(!av.length)return null;
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(av,3));
  geo.computeVertexNormals();
  return new THREE.Mesh(geo,new THREE.MeshPhongMaterial({
    color:new THREE.Color(...col),
    transparent:true,
    opacity:op,
    side:THREE.DoubleSide,
    shininess:4,
    depthWrite:false
  }));
}
function featureToBorder(feat){
  const l=[];
  const ps=feat.geometry.type==='Polygon'?[feat.geometry.coordinates]:feat.geometry.coordinates;
  ps.forEach(p=>p.forEach(r=>{
    const pts=[];
    for(let i=0;i<r.length;i++){
      const[lo,la]=r[i];
      if(i>0){
        const[plo,pla]=r[i-1];
        pts.push(ll2v((pla+la)/2,(plo+lo)/2,R+0.005));
      }
      pts.push(ll2v(la,lo,R+0.005));
    }
    const bl=new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.22})
    );
    bl.renderOrder=16;l.push(bl);
  }));
  return l;
}
const cMeshes={};const DIM=[0.72,0.71,0.70];const DIM_OP=0.88;
function buildLand(feats){
  feats.forEach(f=>{
    if(!f.geometry)return;
    const m=featureToMesh(f,DIM,DIM_OP);
    if(m){m.userData.id=f.id+'';globe.add(m);cMeshes[f.id+'']=m;}
    featureToBorder(f).forEach(l=>globe.add(l));
  });
}

let currentHlIds=[];
function applyHL(ev){
  // All country meshes transparent by default — satellite texture shows through
  Object.values(cMeshes).forEach(m=>{m.material.color.setRGB(...DIM);m.material.opacity=0.88;m.material.transparent=true;m.renderOrder=15;});
  currentHlIds=[];
  if(!ev)return;
  currentHlIds=ev.hlIds||[];
  // Highlighted countries get a semi-transparent color overlay on top of satellite
  currentHlIds.forEach(id=>{const m=cMeshes[id];if(m){m.material.color.setRGB(...ev.hlC);m.material.opacity=0.5;m.material.transparent=true;m.renderOrder=15;}});
}

// Arcs
let arcObjs=[];
function clearArcs(){arcObjs.forEach(o=>globe.remove(o));arcObjs=[];}
function makeArc(fLL,tLL,col){
  const w=arcW(fLL);
  const pts=[];
  for(let i=0;i<=80;i++){const t=i/80;const la=fLL[1]+(tLL[1]-fLL[1])*t;const lo=fLL[0]+(tLL[0]-fLL[0])*t;const h=R+0.015+Math.sin(t*Math.PI)*0.07;pts.push(ll2v(la,lo,h));}
  if(w>1.5){
    const curve=new THREE.CatmullRomCurve3(pts);
    const tr=0.0012+(w/3.5)*0.0018;
    const tg=new THREE.TubeGeometry(curve,80,tr,5,false);
    const tm=new THREE.Mesh(tg,new THREE.MeshBasicMaterial({color:new THREE.Color(...col),transparent:true,opacity:0.72}));
    globe.add(tm);arcObjs.push(tm);
  } else {
    const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:new THREE.Color(...col),transparent:true,opacity:0.68}));
    globe.add(ln);arcObjs.push(ln);
  }
  const tip=pts[pts.length-1],near=pts[pts.length-5];
  const dir=new THREE.Vector3().subVectors(tip,near).normalize();
  const up=tip.clone().normalize();
  const right=new THREE.Vector3().crossVectors(dir,up).normalize();
  const as=0.003+(w/3.5)*0.002;right.multiplyScalar(as);
  const back=dir.clone().multiplyScalar(-as*2.2);
  const av2=[tip.x,tip.y,tip.z,tip.x+back.x+right.x,tip.y+back.y+right.y,tip.z+back.z+right.z,tip.x+back.x-right.x,tip.y+back.y-right.y,tip.z+back.z-right.z];
  const ag=new THREE.BufferGeometry();ag.setAttribute('position',new THREE.Float32BufferAttribute(av2,3));
  globe.add(new THREE.Mesh(ag,new THREE.MeshBasicMaterial({color:new THREE.Color(...col),side:THREE.DoubleSide})));
  const ar=new THREE.Mesh(ag.clone(),new THREE.MeshBasicMaterial({color:new THREE.Color(...col),side:THREE.DoubleSide}));
  arcObjs.push(ar);
  const dr=0.003+(w/3.5)*0.002;
  const dot=new THREE.Mesh(new THREE.SphereGeometry(dr,6,6),new THREE.MeshBasicMaterial({color:new THREE.Color(...col)}));
  dot.position.copy(ll2v(fLL[1],fLL[0],R+0.02));globe.add(dot);arcObjs.push(dot);
}
function applyArcs(ev){clearArcs();if(!ev||!ev.arcs)return;ev.arcs.forEach(a=>makeArc(a.f,a.t,a.col));}

function setCam(ev){
  if(!ev)return;
  const v=ll2v(ev.camLat,ev.camLon,1).normalize();
  qTgt.copy(new THREE.Quaternion().setFromUnitVectors(v,new THREE.Vector3(0,0,1)));
  userQ.identity();camTgt.set(0,0,ev.camDist);
}

// ─ RENDER LOOP ─
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.1);
  qCur.slerp(qTgt,Math.min(1,dt*4.5));
  if(!dragging){
    if(Math.abs(momX)>0.0001||Math.abs(momY)>0.0001){
      const qx=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),momX*0.9);
      const qy=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),momY*0.9);
      userQ.premultiply(qx).premultiply(qy);momX*=0.9;momY*=0.9;
      if(Math.abs(momX)<0.0002)momX=0;if(Math.abs(momY)<0.0002)momY=0;
    }
    if(autoSpin){const qs=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0),dt*0.04);userQ.premultiply(qs);}
  }
  globe.quaternion.copy(qCur.clone().multiply(userQ));
  camCur.lerp(camTgt,Math.min(1,dt*4.5));camera.position.copy(camCur);camera.lookAt(0,0,0);
  if(!dialDrag){dialOff+=(dialTgt-dialOff)*Math.min(1,dt*14);renderDial();}
  fadeAllTiles(dt);
  renderer.render(scene,camera);
}

function buildDial(){
  dialTrack.innerHTML='';

}
function renderDial(){
  dialTrack.style.transform=`translateX(${dialOff}px)`;
  const cl=Math.max(0,Math.min(EVENTS.length-1,Math.round(-dialOff/TW)));
  dialTrack.querySelectorAll('.tk').forEach((t,i)=>{const d=Math.abs(i-cl);t.classList.toggle('active',i===cl);t.classList.toggle('near',d===1);t.style.opacity=Math.max(0.28,1-d*0.22);});
}
function goTo(idx){
  idx=Math.max(0,Math.min(EVENTS.length-1,idx));curIdx=idx;dialTgt=-idx*TW;

// ─ PANEL ─
const panelEl=document.getElementById('panel'),pc=document.getElementById('pc');
document.getElementById('pcl').addEventListener('click',()=>panelEl.classList.remove('open'));
function openPanel(ev){
  if(!ev.panel){panelEl.classList.remove('open');return;}
  const p=ev.panel;let h='';
  if(p.img)h+=`<div class="p-iw"><img src="${p.img}" onerror="this.parentNode.style.background='var(--mauve)';this.style.display='none'" alt=""><div class="p-ic">${p.imgCap||''}</div></div>`;
  h+=`<div class="p-b">`;
  h+=`<div class="p-fl ${p.fc}">${p.flag}</div>`;
  h+=`<div class="p-nm">${p.name}</div>`;
  if(p.pct)h+=`<div class="p-pt">${p.pct}</div>`;
  if(p.stats){h+=`<div class="p-sr">`;p.stats.forEach(s=>{h+=`<div class="p-st"><div class="p-sn">${s.n}</div><div class="p-sl">${s.l}</div></div>`;});h+=`</div>`;}
  p.secs.forEach(s=>{h+=`<div class="p-hr"></div><div class="p-sh">${s.h}</div><div class="p-tx">${s.t}</div>`;});
  if(p.today)h+=`<div class="p-hr"></div><div class="p-td"><div class="p-tdh">${p.today.h}</div><div class="p-tdt">${p.today.t}</div></div>`;
  h+=`</div>`;
  pc.innerHTML=h;panelEl.classList.add('open');
}

// ─ RESIZE ─
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});

// ─ INIT ─
async function init(){
  const lbf=document.getElementById('lbf'),lbl=document.getElementById('lbl');
  lbf.style.width='15%';lbl.textContent='Loading geography...';
  const wd=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  lbf.style.width='55%';lbl.textContent='Tessellating countries...';
  const feats=topojson.feature(wd,wd.objects.countries).features;
  lbf.style.width='78%';lbl.textContent='Building globe...';
  buildLand(feats);
  applySatelliteTexture();
  lbf.style.width='92%';lbl.textContent='Building timeline...';
  buildDial();
  lbf.style.width='100%';
  setTimeout(()=>{const lo=document.getElementById('loading');lo.style.transition='opacity .5s';lo.style.opacity='0';setTimeout(()=>lo.style.display='none',500);},200);
  goTo(0);animate();
}
init();
</script>
